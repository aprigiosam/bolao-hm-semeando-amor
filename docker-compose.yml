services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao_hm
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao_dev
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - bolao_hm_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_hm"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://bolao:bolao_dev@db:5432/bolao_hm
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin_dev}
    ports:
      - "3000:3000"

volumes:
  bolao_hm_pgdata:
