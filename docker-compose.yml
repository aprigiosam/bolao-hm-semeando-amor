services:
  db:
    image: postgres:16-alpine
    container_name: bolao-hm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao_hm
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao_dev
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - bolao_hm_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_hm"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: bolao-hm-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  bolao_hm_pgdata:
